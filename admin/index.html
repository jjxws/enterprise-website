<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理</title>
<style>
*{box-sizing:border-box}
body{font-family:Arial;margin:20px;background:#f5f5f5}
.login{max-width:320px;margin:80px auto;background:white;padding:24px;border-radius:8px}
.admin{display:none;max-width:900px;margin:auto;background:white;padding:24px;border-radius:8px}
input,textarea,button{width:100%;padding:10px;margin:6px 0}
button{background:#0066cc;color:white;border:none;border-radius:4px}
.item{background:#f9f9f9;padding:12px;margin:10px 0;border-radius:6px}
img{max-width:80px}
.section{margin-top:30px;padding-top:20px;border-top:1px solid #eee}
</style>
</head>

<body>

<div class="login" id="loginBox">
  <h3>登录</h3>
  <input type="password" id="pwd" placeholder="密码：请输入密码">
  <button onclick="login()">登录</button>
</div>

<div class="admin" id="adminBox">
  <h2>全站管理</h2>

  <div class="section">
    <h3>首页设置</h3>
    <input id="h_title" placeholder="标题">
    <textarea id="h_content" placeholder="介绍"></textarea>
    <input type="file" id="h_img" accept="image/*"><br>
    <button onclick="saveHome()">保存首页</button>
  </div>

  <div class="section">
    <h3>产品管理</h3>
    <input id="p_title" placeholder="产品标题">
    <textarea id="p_content" placeholder="介绍"></textarea>
    <input type="file" id="p_img" accept="image/*"><br>
    <button onclick="saveProduct()">添加产品</button>
    <div id="p_list"></div>
  </div>

  <div class="section">
    <h3>新闻管理</h3>
    <input type="date" id="n_date">
    <input id="n_title" placeholder="新闻标题">
    <textarea id="n_content" placeholder="内容"></textarea>
    <input type="file" id="n_img" accept="image/*"><br>
    <button onclick="saveNews()">添加新闻</button>
    <div id="n_list"></div>
  </div>
</div>

<script>
const PASSWORD = "qwer@1234";
let isLogin = false;

function login() {
  if (document.getElementById('pwd').value === PASSWORD) {
    document.getElementById('loginBox').style.display = "none";
    document.getElementById('adminBox').style.display = "block";
    loadAll();
  } else alert("密码错误");
}

async function toBase64(fileInput) {
  const file = fileInput.files[0];
  if (!file) return "";
  return new Promise(r => {
    const fr = new FileReader();
    fr.onload = () => r(fr.result);
    fr.readAsDataURL(file);
  });
}

// ================== 首页 ==================
async function saveHome() {
  const img = await toBase64(document.getElementById('h_img'));
  const data = {
    title: document.getElementById('h_title').value,
    content: document.getElementById('h_content').value,
    img: img
  };
  await fetch('/api/home', { method: 'POST', body: JSON.stringify(data) });
  alert('保存成功');
}

// ================== 产品（修复删除）==================
async function saveProduct() {
  const img = await toBase64(document.getElementById('p_img'));
  const data = {
    title: document.getElementById('p_title').value,
    content: document.getElementById('p_content').value,
    img: img
  };
  await fetch('/api/products', { method: 'POST', body: JSON.stringify(data) });
  alert('添加成功');
  loadProducts();
}

// 改成全局函数，确保 onclick 能找到
window.delProduct = async function(idx) {
  if (!confirm("确定删除？")) return;
  try {
    const res = await fetch("/api/products", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ del: 1, idx: idx })
    });
    if (!res.ok) throw new Error("删除失败");
    loadProducts();
  } catch (e) {
    alert("删除失败：" + e.message);
  }
};
// ================== 新闻（修复删除）==================
async function saveNews() {
  const img = await toBase64(document.getElementById('n_img'));
  const data = {
    date: document.getElementById('n_date').value,
    title: document.getElementById('n_title').value,
    content: document.getElementById('n_content').value,
    img: img
  };
  await fetch('/api/news', { method: 'POST', body: JSON.stringify(data) });
  alert('添加成功');
  loadNews();
}

// 改成全局函数
window.delNews = async function(idx) {
  if (!confirm("确定删除？")) return;
  try {
    const res = await fetch("/api/news", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ del: 1, idx: idx })
    });
    if (!res.ok) throw new Error("删除失败");
    loadNews();
  } catch (e) {
    alert("删除失败：" + e.message);
  }
};

// ================== 加载 ==================
async function loadHome() {
  const d = await (await fetch('/api/home')).json();
  document.getElementById('h_title').value = d.title;
  document.getElementById('h_content').value = d.content;
}

async function loadProducts() {
  const list = await (await fetch('/api/products')).json();
  p_list.innerHTML = list.map((i, idx) => `
    <div class="item">
      <h4>${i.title}</h4>
      <p>${i.content}</p>
      ${i.img ? `<img src="${i.img}">` : ''}
      <button onclick="delProduct(${idx})">删除</button>
    </div>
  `).join('');
}

async function loadNews() {
  const list = await (await fetch('/api/news')).json();
  n_list.innerHTML = list.map((i, idx) => `
    <div class="item">
      <h4>${i.title}</h4>
      <p>${i.date}</p>
      <p>${i.content}</p>
      ${i.img ? `<img src="${i.img}">` : ''}
      <button onclick="delNews(${idx})">删除</button>
    </div>
  `).join('');
}

function loadAll() {
  loadHome();
  loadProducts();
  loadNews();
}
</script>


</body>
</html>
