<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:30px;background:#f5f5f5}
.container{max-width:900px;margin:0 auto;background:#fff;padding:30px;border-radius:8px}
input,textarea{width:100%;padding:12px;margin:5px 0;border:1px solid #ddd;border-radius:4px}
textarea{min-height:120px}
button{padding:12px 20px;background:#0066cc;color:white;border:none;border-radius:4px;cursor:pointer}
.section{margin-top:30px;padding-top:20px;border-top:1px solid #eee}
.item{padding:15px;background:#f9f9f9;margin:10px 0;border-radius:6px}
</style>
</head>
<body>

<div class="container">
  <h1>企业网站后台</h1>

  <div class="section">
    <h2>产品管理</h2>
    <input id="prodTitle" placeholder="产品标题">
    <textarea id="prodContent" placeholder="产品介绍"></textarea>
    <button onclick="saveProduct()">保存产品</button>
    <div id="prodList"></div>
  </div>

  <div class="section">
    <h2>新闻管理</h2>
    <input type="date" id="newsDate">
    <input id="newsTitle" placeholder="新闻标题">
    <textarea id="newsContent" placeholder="新闻内容"></textarea>
    <button onclick="saveNews()">保存新闻</button>
    <div id="newsList"></div>
  </div>
</div>

<script>
// 加载产品
async function loadProducts() {
  let res = await fetch("/api/products")
  let list = await res.json()
  let html = ""
  list.forEach(item => {
    html += `<div class="item"><h3>${item.title}</h3><p>${item.content}</p></div>`
  })
  document.getElementById("prodList").innerHTML = html
}

// 保存产品
async function saveProduct() {
  let title = document.getElementById("prodTitle").value.trim()
  let content = document.getElementById("prodContent").value.trim()
  if (!title || !content) return alert("请填写完整")

  let res = await fetch("/api/products", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title, content })
  })

  if (res.ok) {
    alert("保存成功！")
    loadProducts()
  } else {
    alert("保存失败：" + res.status)
  }
}

// 加载新闻
async function loadNews() {
  let res = await fetch("/api/news")
  let list = await res.json()
  let html = ""
  list.forEach(item => {
    html += `<div class="item"><h3>${item.title}</h3><p>${item.date}</p><p>${item.content}</p></div>`
  })
  document.getElementById("newsList").innerHTML = html
}

// 保存新闻
async function saveNews() {
  let date = document.getElementById("newsDate").value
  let title = document.getElementById("newsTitle").value.trim()
  let content = document.getElementById("newsContent").value.trim()
  if (!date || !title || !content) return alert("请填写完整")

  let res = await fetch("/api/news", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ date, title, content })
  })

  if (res.ok) {
    alert("保存成功！")
    loadNews()
  } else {
    alert("保存失败：" + res.status)
  }
}

// 初始化
loadProducts()
loadNews()
</script>

</body>
</html>
