<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>产品中心</title>
<style>
body{font-family:Arial;margin:0;}
header{background:#222;color:#fff;padding:10px 20px;}
nav a{color:#fff;margin:0 10px;text-decoration:none;}
section{max-width:1000px;margin:40px auto;padding:0 20px;}
.product{border:1px solid #ddd;padding:15px;margin:15px 0;}
footer{background:#222;color:#fff;text-align:center;padding:20px;}
</style>
</head>
<body>
<header>
  <h1>产品中心</h1>
  <nav>
    <a href="/">首页</a>
    <a href="/products.html">产品</a>
    <a href="/news.html">新闻</a>
    <a href="/contact.html">联系我们</a>
    <a href="/admin/">后台</a>
  </nav>
</header>
<section>
  <h2>产品列表</h2>
  <div id="list">加载中……</div>
</section>
<footer>© 2026 XX企业 版权所有</footer>
<script>
fetch('/api/products')
.then(r=>r.json())
.then(arr=>{
  let html=arr.map(p=>`
    <div class="product">
      <h3>${p.title}</h3>
      <p>${p.content}</p>
    </div>
  `).join('');
  document.getElementById('list').innerHTML=html||'<p>暂无产品</p>';
});
</script>
</body>
</html>
